name: Publish

on:
  push:
    branches: [main]

jobs:
  canary:
    runs-on: ubuntu-latest
    concurrency:
      group: canary-release
      cancel-in-progress: true
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Set canary version
        working-directory: packages/core
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          bun -e "
            const pkg = await Bun.file('package.json').json();
            const [major, minor, patch] = pkg.version.split('-')[0].split('.').map(Number);
            pkg.version = major + '.' + minor + '.' + (patch + 1) + '-canary.${SHA}';
            await Bun.write('package.json', JSON.stringify(pkg, null, '\t') + '\n');
            console.log('Published version: ' + pkg.version);
          "

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish canary
        working-directory: packages/core
        run: npm publish --tag canary --provenance --access public

  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Disable git hooks
        run: git config core.hooksPath /dev/null

      - name: Build
        run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun changeset version
          publish: bun changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
